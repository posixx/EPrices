    lambda: |-
      int h = id(ha_time).now().hour;
      int c1s = id(cheap1_start), c1e = id(cheap1_end);
      int c2s = id(cheap2_start), c2e = id(cheap2_end);
      if (c1s >= 0 && h >= c1s && h < c1e) return true;
      if (c2s >= 0 && h >= c2s && h < c2e) return true;
      return false;

  - platform: template
    name: "Priciest Hours"
    id: priciest_hours
    icon: "mdi:cash-plus"
    lambda: |-
      int h = id(ha_time).now().hour;
      int e1s = id(expensive1_start), e1e = id(expensive1_end);
      int e2s = id(expensive2_start), e2e = id(expensive2_end);
      if (e1s >= 0 && h >= e1s && h < e1e) return true;
      if (e2s >= 0 && h >= e2s && h < e2e) return true;
      return false;

# =============================================================================
# BUTTONS
# =============================================================================
button:
  - platform: template
    name: "Force Today's Update"
    id: force_update_button
    icon: "mdi:refresh"
    on_press:
      then:
        - logger.log: "Manual Today update triggered"
        - lambda: |-
            id(update_status_message) = "Updating...";
            id(today_price_status_message).publish_state("Updating...");
        - script.execute: smart_price_update

  - platform: template
    name: "Force Tomorrow's Update"
    id: force_tomorrow_update_button
    icon: "mdi:calendar-refresh"
    on_press:
      then:
        - lambda: |-
            auto t = id(ha_time).now();
            bool in_window = (t.hour > 13 && t.hour < 23) ||
                             (t.hour == 13 && t.minute >= 20) ||
                             (t.hour == 23 && t.minute <= 50);
            if (in_window) {
              ESP_LOGI("eprices", "Manual Tomorrow update triggered");
              id(tomorrow_update_status_message) = "Updating...";
              id(tomorrow_price_status_message).publish_state("Updating...");
              id(smart_tomorrow_price_update).execute();  // one-shot
            } else {
