      if (id(tomorrow_entry_count) == 0) return NAN;
      int64_t ts = (int64_t)id(ha_time).now().timestamp + 86400;
      int idx = -1;
      for (int j = id(tomorrow_entry_count) - 1; j >= 0; --j)
        if (id(price_timestamps_tomorrow)[j] <= ts) { idx = j; break; }
      if (idx < 0) return NAN;
